services:
  mariadb:
    container_name: mariadb
    image: mariadb
    build: ./requirements/mariadb
    restart: on-failure
    env_file:
      - .env
    networks:
      - inception_network
    volumes:
      - mariadb_data:/var/lib/mysql
    secrets:
      - db_root_password
      - db_password
  wordpress:
    container_name: wordpress
    image: wordpress
    build: ./requirements/wordpress
    restart: on-failure
    env_file:
      - .env
    networks:
      - inception_network
    depends_on:
      - mariadb
    volumes:
      - wordpress_data:/var/www/html
    secrets:
      - db_password
      - credentials
  nginx:
    container_name: nginx
    image: nginx
    build: ./requirements/nginx
    restart: on-failure
    ports:
      - "443:443"
    networks:
      - inception_network
    depends_on:
      - wordpress
    volumes:
      - wordpress_data:/var/www/html

networks:
  inception_network:
    name: inception_network
    driver: bridge


volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/pibreiss/data/mariadb
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/pibreiss/data/wordpress

secrets:
  db_root_password:
    file: ../secrets/db_root_password.txt
  db_password:
    file: ../secrets/db_password.txt
  credentials:
    file: ../secrets/credentials.txt
